    <script>
    const { createApp, ref, computed, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            // 数据绑定
            const spineId = ref('H320310');
            const selectedFile = ref('');
            const selectedAction = ref('');
            const isLoop = ref(true);
            const timeScale = ref(10);
            const spineScale = ref(10);
            const timeProgress = ref(0);
            const maxProgress = ref(30000);
            const actionTime = ref('');
            const msg = ref('');
            const bgColor = ref('transparent');
            const loading = ref(false);

            // 数据列表
            const fileList = ref({});
            const actionList = ref([]);
            const bones = ref([]);
            const events = ref([]);

            // Spine 对象
            let canvas, gl, renderer, assetManager;
            let skeleton, skeletonData, state;
            let playing = false;
            const spineUrl = '/spine/index.php';

            // 初始化 Canvas
            function initCanvas() {
                canvas = document.getElementById('canvas');
                gl = canvas.getContext('webgl');
                renderer = new spine.webgl.SceneRenderer(canvas, gl, { premultipliedAlpha: true });
                assetManager = new spine.webgl.AssetManager(gl);
            }

            // 加载 Spine
            function loadSpine() {
                if (!spineId.value) {
                    msg.value = '请输入资源ID';
                    return;
                }
                loading.value = true;
                msg.value = '';

                const time = new Date().getTime();
                window.location.href = window.location.origin + window.location.pathname + '?spine_id=' + spineId.value + '&time=' + time;
            }

            // 初始化 Spine
            function initSpine() {
                if (!selectedFile.value) return;
                loading.value = true;

                const file = selectedFile.value;
                const pngFiles = fileList.value[file] || [];

                assetManager.loadBinary(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + file + '.skel');
                assetManager.loadText(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + file + '.atlas');
                assetManager.loadTexture(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + file + '.png');

                for (let i = 0; i < pngFiles.length; i++) {
                    assetManager.loadTexture(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + pngFiles[i] + '.png');
                }

                requestAnimationFrame(loadAssets);
            }

            // 加载资源
            function loadAssets() {
                if (assetManager.isLoadingComplete()) {
                    const file = selectedFile.value;

                    const atlas = new spine.TextureAtlas(
                        assetManager.get(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + file + '.atlas'),
                        (path) => assetManager.get(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + path)
                    );

                    const atlasLoader = new spine.AtlasAttachmentLoader(atlas);
                    const skeletonBinary = new spine.SkeletonBinary(atlasLoader);
                    skeletonData = skeletonBinary.readSkeletonData(
                        assetManager.get(spineUrl + "?spine_id=" + spineId.value + '&spine_file=' + file + '.skel')
                    );

                    skeleton = new spine.Skeleton(skeletonData);

                    // 获取动作列表
                    actionList.value = skeletonData.animations.map(a => a.name);
                    if (actionList.value.length > 0) {
                        selectedAction.value = actionList.value[0];
                    }

                    const animationStateData = new spine.AnimationStateData(skeleton.data);
                    state = new spine.AnimationState(animationStateData);
                    state.timeScale = 1.0;

                    playSpineAction();
                    requestAnimationFrame(render);
                    loading.value = false;
                } else {
                    requestAnimationFrame(loadAssets);
                }
            }

            // 播放动作
            function playSpineAction() {
                if (!state || !skeletonData) return;

                const action = state.setAnimation(0, selectedAction.value, isLoop.value);
                action.timeScale = timeScale.value * 0.1;

                skeleton.scaleX = spineScale.value * 0.1;
                skeleton.scaleY = spineScale.value * 0.1;

                // 获取动作详情
                for (let i = 0; i < skeletonData.animations.length; i++) {
                    if (skeletonData.animations[i].name === selectedAction.value) {
                        parseAnimation(skeletonData.animations[i]);
                        break;
                    }
                }

                playing = true;
            }

            // 解析动作
            function parseAnimation(animation) {
                actionTime.value = animation.duration;
                maxProgress.value = Math.round(animation.duration * 1000);
