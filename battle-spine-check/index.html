<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spine 检查工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; margin-bottom: 40px; }
    .tools { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .tool-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 30px 40px; text-decoration: none; color: inherit; transition: all 0.2s; display: block; min-width: 200px; }
    .tool-card:hover { border-color: #38bdf8; transform: translateY(-4px); box-shadow: 0 8px 25px rgba(56, 189, 248, 0.15); }
    .tool-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .tool-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
    .tool-card p { color: #94a3b8; font-size: 0.85rem; }
    .back { margin-top: 40px; }
    .back a { color: #38bdf8; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦴 Spine 检查工具</h1>
    <p class="subtitle">选择要使用的工具</p>
    <div class="tools">
      <a href="spine_check.html" class="tool-card">
        <div class="icon">🔍</div>
        <h3>骨骼检查</h3>
        <p>检查骨骼动画资源</p>
      </a>
      <a href="spine_preview.html" class="tool-card">
        <div class="icon">👁️</div>
        <h3>骨骼预览</h3>
        <p>预览 Spine 动画效果</p>
      </a>
    </div>
    <p class="back"><a href="/">← 返回 AITools</a></p>
  </div>
</body>
</html>
